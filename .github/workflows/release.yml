name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm i -D patch-package
      - run: npm ci
      - run: npm run generate
      - run: npm run lint
      - run: npm run format:check
      - run: npm run build
      - run: npm test
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.npm_token }}

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Push Docker image to fly.io registry
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: ms-365-mcp-server
          SHA: ${{ github.sha }}
        run: |
          flyctl auth docker
          docker build \
            -t "registry.fly.io/$FLY_APP:$SHA" \
            -t "registry.fly.io/$FLY_APP:latest" \
            .
          docker push "registry.fly.io/$FLY_APP:$SHA"
          docker push "registry.fly.io/$FLY_APP:latest"
